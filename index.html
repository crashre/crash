<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrashV2.4 - Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #ff0055;
    --secondary: #00f2ff;
    --bg: #0a0a0c;
}

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: var(--bg);
    background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 0, 85, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    text-align: center;
}

.maintenance-container {
    padding: 40px;
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    max-width: 90%;
}

.logo-text {
    font-size: clamp(30px, 6vw, 50px);
    font-weight: 900;
    background: linear-gradient(to right, var(--primary), #ff7eb3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.message {
    font-size: clamp(18px, 4vw, 24px);
    color: var(--secondary);
    text-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
    line-height: 1.6;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.glow-bar {
    width: 100px;
    height: 3px;
    background: var(--primary);
    margin: 30px auto;
    box-shadow: 0 0 15px var(--primary);
    border-radius: 5px;
}

.sub-message {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="maintenance-container">
    <div class="logo-text">CRASH V2.4 PRO</div>
    <div class="glow-bar"></div>
    <div class="message">
        We will be back soon with a new exploit.<br>Stay tuned.
    </div>
    <div class="sub-message">SYSTEM STATUS: UNDER MAINTENANCE</div>
</div>

<div style="position: fixed; bottom: 20px; font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 2px;">
    ALL RIGHTS RESERVED &copy; 2026
</div>

</body>
</html>
